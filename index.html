	body {
  min-height: 100vh;
  margin: 0;
  padding: 0;
  color: #FFFFFF;
  background-color: #ED839A;
  overflow: hidden; 
  position: relative;
}

.svg-wrapper {
  height: 100vh;
}

.svg-wrapper svg {
  display:			block;
  width:				auto;
  height:				100%;
  margin:				auto;
}

@media only screen and (max-width: 47.98em) {
  .svg-wrapper svg {
    max-width: 100%;
  }
}

g.surprise-gift {
  filter: url('#product-dropshadow');
}

.bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: #FF9F43;
  z-index: -1;
  opacity: 0;
}

.bg.gift-open {
  animation: fadeOut 3.5s ease-out forwards;
}

@keyframes fadeOut {
  0% { opacity: 1; }
  100% { opacity: 0; }
}

#letterContainer {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 100;
  background: rgba(0, 0, 0, 0.5);
  padding: 20px;
  border-radius: 15px;
  backdrop-filter: blur(8px);
  display: none;
}

#letterImage {
  display: block;
  max-width: 80vw;
  max-height: 80vh;
  border-radius: 10px;
  cursor: pointer;
}

#confetti-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 90;
}

#letterContainer{
  position: fixed;
  overflow: visible;
}

#paperGif{
  position: absolute;
  left: 50%;
  bottom: 0px;
  transform: translateX(-50%);
  width: clamp(64px, 14vw, 110px);
  height: auto;
  pointer-events: none;
  z-index: 101;
  border-radius: 10px;
  filter: drop-shadow(0 6px 10px rgba(0,0,0,.18));
}

.confetti-piece {
  position: absolute;
}
  </style>
</head>

<script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js'></script>
<script src='https://unpkg.co/gsap@3/dist/gsap.min.js'></script>
<script src='https://unpkg.com/gsap@3/dist/CustomWiggle.min.js'></script>
<script src='https://unpkg.com/gsap@3/dist/EasePack.min.js'></script>
<script src='https://unpkg.com/gsap@3/dist/CustomEase.min.js'></script>
<script>
	gsap.registerPlugin(CustomEase, EasePack, CustomWiggle);

jQuery(function($) {
  let confettiInterval;
  const letterContainer = $('#letterContainer');
  const gift = $('g.surprise-gift');
  const confettiContainer = $('<div id="confetti-container"></div>').appendTo('body');
  const confettiColors = ["#2ecc71", "#3498db", "#9b59b4", "#f1c40f", "#e67e22", "#e74c3c", "#f368e0"];

  $('[data-origin]').each(function() {
    gsap.set($(this).get(0), { transformOrigin: $(this).attr('data-origin') });
  });

  CustomWiggle.create('giftShake', { wiggles: 60, timingEase: 'expo.out' });

  let openGiftTL = gsap.timeline({ delay: 0.5 });
  openGiftTL.to(gift, { rotation: 2.5, duration: 2, ease: 'giftShake', onStart: () => $('.bg').removeClass('gift-open') });
  openGiftTL.to(gift.find('.lid'), {
    yPercent: -70,
    rotation: -5,
    duration: 0.25,
    delay: -0.15,
    ease: 'back.out(4)',
    onStart: () => $('.bg').addClass('gift-open'),
    onComplete: showLetterAndStartConfetti
  });
  openGiftTL.to(gift.find('.lid-cast-shadow'), { scaleY: 2, opacity: 0, duration: 0.25, delay: -0.4, ease: 'expo.in' });

  function showLetterAndStartConfetti() {
    letterContainer.fadeIn(500);
    confettiInterval = setInterval(dropConfetti, 100);
  }

  function dropConfetti() {
    const piece = $('<div class="confetti-piece"></div>');
    const startX = Math.random() * window.innerWidth;
    const color = confettiColors[(Math.random() * confettiColors.length) | 0];


    piece.css({
      left: startX,
      backgroundColor: color,
      width: '45px',  
      height: '26px'   
    });

    confettiContainer.append(piece);

    const duration = Math.random() * 3 + 3; 
    const endY = window.innerHeight + 20;
    const endRotation = (Math.random() - 0.5) * 1000;

    gsap.to(piece, {
      y: endY,
      rotation: endRotation,
      duration: duration,
      ease: 'none',
      opacity: 1,
      onComplete: () => piece.remove()
    });
  }

  $('#letterImage').on('click', function() {
    letterContainer.fadeOut(500);
    clearInterval(confettiInterval);

    let closeGiftTL = gsap.timeline({ delay: 0.5 });
    closeGiftTL.to(gift.find('.lid'), { yPercent: 0, rotation: 0, duration: 0.5, ease: 'bounce.out' });
    closeGiftTL.to(gift.find('.lid-cast-shadow'), { scaleY: 1, opacity: 0.2, duration: 0.5, delay: -0.5, ease: 'bounce.out' });
    closeGiftTL.to(gift, { rotation: 0, duration: 1.5, ease: 'elastic.out(1, 0.3)', delay: -0.2 });
  });
});
</script>
